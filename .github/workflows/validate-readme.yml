name: Validate README

on:
  workflow_dispatch:
  pull_request:
    paths:
      - README.md
      - src/components/*/README.md

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gravity-ui/readme-validator@v1
        with:
          type: package

  validate-components:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gravity-ui/readme-validator@v1
        with:
          type: component
          paths: src/components/*/README.md
